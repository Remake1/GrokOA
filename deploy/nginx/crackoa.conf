map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream crackoa_web {
    server host.docker.internal:5173;
    keepalive 32;
}

upstream crackoa_api {
    server host.docker.internal:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Route API HTTP + WebSocket traffic to Go API.
    location /api/ {
        proxy_pass http://crackoa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Route all other traffic to the Vue app.
    location / {
        proxy_pass http://crackoa_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
