version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
    configs:
      - source: crackoa_edge_nginx
        target: /etc/nginx/conf.d/default.conf
    networks:
      - crackoa
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  web:
    image: ${WEB_IMAGE:-crackoa/web:swarm-local}
    networks:
      - crackoa
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  api:
    image: ${API_IMAGE:-crackoa/api:swarm-local}
    environment:
      CONFIG_PATH: /app/config.yaml
      ACCESS_KEY_FILE: /run/secrets/crackoa_access_key
      JWT_SECRET_FILE: /run/secrets/crackoa_jwt_secret
      OPENAI_API_KEY_FILE: /run/secrets/crackoa_openai_api_key
      GEMINI_API_KEY_FILE: /run/secrets/crackoa_gemini_api_key
    networks:
      - crackoa
    volumes:
      - screenshots:/app/screenshots
    secrets:
      - source: crackoa_access_key
        target: crackoa_access_key
      - source: crackoa_jwt_secret
        target: crackoa_jwt_secret
      - source: crackoa_openai_api_key
        target: crackoa_openai_api_key
      - source: crackoa_gemini_api_key
        target: crackoa_gemini_api_key
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

configs:
  crackoa_edge_nginx:
    file: ./nginx.conf

secrets:
  crackoa_access_key:
    external: true
  crackoa_jwt_secret:
    external: true
  crackoa_openai_api_key:
    external: true
  crackoa_gemini_api_key:
    external: true

networks:
  crackoa:
    driver: overlay
    attachable: true

volumes:
  screenshots:
