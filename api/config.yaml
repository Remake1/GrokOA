http:
  host: "0.0.0.0"
  port: "8080"
  read_timeout: "5s"
  write_timeout: "10s"
  idle_timeout: "60s"
  shutdown_timeout: "10s"

logging:
  level: "info"
  format: "console"
  time_field_format: "2006-01-02T15:04:05Z07:00"
  include_caller: false

auth:
  token_ttl: "4h"
  rate_limit:
    max_failed_attempts: 5
    window: "1h"

screenshot:
  dir: "./screenshots"

room:
  grace_period: "5m"

ai:
  openai:
    models:
      - "gpt-5.3-codex"
      - "gpt-5.4-2026-03-05"
      - "gpt-5.1-codex-mini"
      - "gpt-5-mini-2025-08-07"
  gemini:
    models:
      - "gemini-3-flash-preview"
      - "gemini-3.1-pro-preview"
      - "gemini-3.1-flash-lite-preview"
